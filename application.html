<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now | GlobalTech Inc.</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
    <a href="home.html">Home</a>
    <a href="careers.html">Careers</a>
</nav>

<section id="apply">
    <h2>Job Application</h2>
    <p>Fill in the form below to apply for a position at GlobalTech Inc.</p>

    <form action="#" method="post">

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label for="position">Position Applying For:</label><br>
        <select id="position" name="position" required>
            <option value="">-- Select Position --</option>
            <option value="software_engineer">Software Engineer</option>
            <option value="marketing_specialist">Marketing Specialist</option>
        </select><br><br>

        <label for="cv">Upload CV:</label><br>
        <input type="file" id="cv" name="cv" required><br><br>

        <label for="message">Cover Letter:</label><br>
        <textarea id="message" name="message" rows="5" placeholder="Write a short cover letter..."></textarea><br><br>

        <button type="submit">Submit Application</button>

    </form>
</section>

<footer>
    <p>&copy; 2024 GlobalTech Inc.</p>
</footer>

</body>
</html>
